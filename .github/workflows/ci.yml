name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write # push coverage badge data to the badges branch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.6.1 ./...
      - name: Test
        run: |
          go test ./... -coverprofile=cover.out -coverpkg=./...
          go tool cover -func=cover.out | tail -1
      - name: Dogfood — lintel checks its own architecture
        run: go run ./cmd/lintel check .
      - name: Publish coverage badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          pct=$(go tool cover -func=cover.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          color=orange
          if awk -v p="$pct" 'BEGIN{exit !(p>=60)}'; then color=yellow; fi
          if awk -v p="$pct" 'BEGIN{exit !(p>=75)}'; then color=green; fi
          if awk -v p="$pct" 'BEGIN{exit !(p>=85)}'; then color=brightgreen; fi
          dir=$(mktemp -d)
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}' "$pct" "$color" > "$dir/coverage.json"
          cd "$dir"
          git init -q -b badges
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage.json
          git commit -qm "coverage badge data"
          git push -q --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" badges
