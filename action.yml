name: lintel
description: Architecture lint for any language — enforce arch.yaml rules in CI
branding:
  icon: shield
  color: blue

inputs:
  version:
    description: lintel version to install (a release tag, or "latest")
    default: latest
  args:
    description: Arguments passed to lintel
    default: check --format github
  working-directory:
    description: Directory to run lintel in
    default: "."

runs:
  using: composite
  steps:
    - name: Install and run lintel
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        case "$(uname -s)" in
          Linux)  os=linux ;;
          Darwin) os=darwin ;;
          *) echo "unsupported runner OS: $(uname -s)" >&2; exit 1 ;;
        esac
        case "$(uname -m)" in
          x86_64|amd64)  arch=amd64 ;;
          arm64|aarch64) arch=arm64 ;;
          *) echo "unsupported runner arch: $(uname -m)" >&2; exit 1 ;;
        esac
        version="${{ inputs.version }}"
        if [ "$version" = "latest" ]; then
          url="https://github.com/yasomaru/lintel/releases/latest/download/lintel_${os}_${arch}.tar.gz"
        else
          url="https://github.com/yasomaru/lintel/releases/download/${version}/lintel_${os}_${arch}.tar.gz"
        fi
        curl -fsSL "$url" | tar xz -C "$RUNNER_TEMP"
        "$RUNNER_TEMP/lintel" ${{ inputs.args }}
